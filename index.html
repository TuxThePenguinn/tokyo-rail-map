<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tokyo Rail Clickable Map</title>

  <link rel="stylesheet" href="style.css" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
</head>

<body>
  <main id="app">
    <section id="map-container">
      <object
        id="rail-map"
        data="map.svg"
        type="image/svg+xml">
      </object>
    </section>

    <aside id="side-panel">
        <button id="close-panel" aria-label="Close panel">×</button>

        <h1 id="station-name">Select a station</h1>

        <div id="image-categories"></div>

        <div id="carousel">
          <button id="carousel-prev">‹</button>
          <img id="carousel-image" src="" alt="" />
          <button id="carousel-next">›</button>
        </div>
        
        <h2>Lines</h2>
        <ul id="station-lines"></ul>

        <h2>Destinations nearby</h2>
        <ul id="station-destinations"></ul>
    </aside>    
  </main>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
